<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>グループ追加申告</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="request-card">
            <h1>グループ追加申告</h1>
            <p>新しいグループを追加する申告を送信してください</p>
            
            <div class="request-form">
                <input type="text" id="groupName" placeholder="グループ名" maxlength="50">
                <textarea id="groupDescription" placeholder="グループの説明" maxlength="300"></textarea>
                <input type="text" id="requesterName" placeholder="申告者名" maxlength="30">
                <input type="email" id="requesterEmail" placeholder="Gmail" maxlength="100">
                <input type="text" id="desiredCode" placeholder="希望コード" maxlength="20">
                <button onclick="submitRequest()">申告送信</button>
            </div>
            
            <p id="requestMessage" class="message"></p>
            
            <div class="request-actions">
                <a href="index.html" class="back-link">トップに戻る</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
