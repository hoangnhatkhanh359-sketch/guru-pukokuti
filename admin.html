<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>管理者設定</title><link rel="stylesheet" href="style.min.css"></head><body><div class="container"><div class="admin-card"><h1>管理者設定</h1><div id="adminLogin"><p>管理者コードを入力してください</p><div class="code-input"><input type="text" id="adminCode" placeholder="管理者コード" maxlength="20"><button onclick="checkAdminCode()">認証</button></div><p id="adminError" class="error"></p><a href="index.html" class="admin-link">トップに戻る</a></div><div id="adminPanel" style="display:none"><div class="current-code"><h2>現在のアクセスコード</h2><p id="currentCode" class="code-display">---</p></div><div class="set-code"><h2>新しいアクセスコードを設定</h2><div class="code-input"><input type="text" id="newCode" placeholder="新しいコード" maxlength="20"><button onclick="setNewCode()">設定</button></div><p id="setCodeError" class="error"></p><p id="setCodeSuccess" class="success"></p></div><div class="admin-tabs"><button class="tab-btn active" onclick="showTab('pending')">保留中の申告</button><button class="tab-btn" onclick="showTab('approved')">承認済み申告</button></div><div id="pendingTab" class="tab-content active"><div class="group-requests"><h2>グループ追加申告一覧</h2><div id="requestsList" class="requests-list"></div></div></div><div id="approvedTab" class="tab-content"><div class="group-requests"><h2>承認済み申告一覧</h2><div id="approvedList" class="requests-list"></div></div></div><div class="admin-actions"><button onclick="logoutAdmin()" class="logout-btn">管理者ログアウト</button><button onclick="goToIndex()" class="back-btn">トップに戻る</button></div></div></div><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script><script src="script.min.js"></script></body></html>
