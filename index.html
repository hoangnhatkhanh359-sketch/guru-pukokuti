<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>メッセージサイト - アクセスコード入力</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="access-card">
            <h1>メッセージサイト</h1>
            <p>アクセスコードを入力してください</p>
            <div class="code-input">
                <input type="text" id="accessCode" placeholder="コードを入力" maxlength="20">
                <button onclick="checkCode()">入場</button>
            </div>
            <p id="errorMessage" class="error"></p>
            <a href="admin.html" class="admin-link">管理者設定</a>
            <a href="group-request.html" class="admin-link">グループ追加申告</a>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
